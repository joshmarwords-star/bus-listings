<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Listings Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F0EEE8;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
    --text: #1A1916; --text2: #6B6960; --text3: #9E9C94;
    --accent: #2D6A4F; --accent-l: #E8F4EE;
    --gold: #B7791F; --gold-l: #FEF3C7;
    --danger: #C0392B; --danger-l: #FDECEA;
    --r: 12px; --rs: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; letter-spacing: -0.3px; }
  .logo-dot { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
  .hdr-r { display: flex; align-items: center; gap: 10px; }
  .cred-pill { display: none; align-items: center; gap: 7px; font-size: 13px; color: var(--text2); background: var(--surface2); border-radius: 20px; padding: 5px 12px; }
  .cred-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

  .btn { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 9px 18px; border-radius: var(--rs); border: none; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #235c43; }
  .btn-primary:disabled { background: var(--text3); cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-outline:hover { background: var(--surface2); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-full { width: 100%; }

  .page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 60px); }
  #search-screen { display: none; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 2.5rem; width: 100%; max-width: 420px; }
  .auth-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.3px; }
  .auth-card .sub { font-size: 14px; color: var(--text2); margin-bottom: 1.75rem; }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  input, select { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--rs); background: var(--bg); color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,106,79,0.12); background: var(--surface); }
  input::placeholder { color: var(--text3); }

  .search-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .search-grid { display: grid; grid-template-columns: 1.1fr 1.1fr 0.7fr; gap: 12px; margin-bottom: 12px; }
  .search-footer { display: flex; align-items: flex-end; gap: 12px; }
  .radius-row { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .radius-row label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .radius-track { display: flex; align-items: center; gap: 10px; }
  .radius-track input[type=range] { flex: 1; accent-color: var(--accent); }
  .radius-val { font-size: 13px; font-weight: 500; min-width: 40px; color: var(--text); font-family: 'DM Mono', monospace; }

  .cat-wrap { position: relative; }
  .cat-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--rs); z-index: 300; max-height: 220px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .cat-item { padding: 8px 12px; font-size: 13px; cursor: pointer; font-family: 'DM Mono', monospace; color: var(--text2); transition: background .1s; }
  .cat-item:hover, .cat-item.active { background: var(--accent-l); color: var(--accent); }
  .cat-loading { padding: 10px 12px; font-size: 13px; color: var(--text3); }

  .geo-status { font-size: 12px; color: var(--text3); margin-top: 4px; min-height: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .geo-ok { color: var(--accent); }
  .geo-err { color: var(--danger); }

  .error-banner { background: var(--danger-l); border: 1px solid rgba(192,57,43,0.2); color: var(--danger); border-radius: var(--rs); padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; }
  .stat-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; font-family: 'DM Mono', monospace; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .results-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .results-hdr h3 { font-size: 15px; font-weight: 600; }
  .results-meta { font-size: 13px; color: var(--text2); }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

  .biz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1.25rem; transition: border-color .15s, transform .15s; }
  .biz-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .biz-hdr { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
  .biz-avatar { width: 42px; height: 42px; border-radius: 10px; background: var(--accent-l); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
  .biz-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; line-height: 1.3; margin-bottom: 3px; }
  .biz-cat { font-size: 12px; color: var(--text2); background: var(--surface2); padding: 2px 8px; border-radius: 20px; display: inline-block; }
  .biz-details { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: var(--text2); }
  .biz-detail { display: flex; align-items: flex-start; gap: 8px; }
  .biz-ico { font-size: 13px; flex-shrink: 0; margin-top: 1px; opacity: .6; }
  .biz-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .rating-pill { display: flex; align-items: center; gap: 5px; background: var(--gold-l); color: var(--gold); font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .badge-y { background: var(--accent-l); color: var(--accent); }
  .badge-n { background: var(--surface2); color: var(--text3); }

  .load-more-row { display: flex; justify-content: center; margin-top: 1.5rem; }
  .loader { display: none; text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text2); }
  .empty-ico { font-size: 44px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

  @media(max-width: 768px) {
    .page { padding: 1rem; }
    .search-grid { grid-template-columns: 1fr; }
    .search-footer { flex-direction: column; align-items: stretch; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot">📍</div>Business Listings</div>
  <div class="hdr-r">
    <div class="cred-pill" id="cred-pill"><div class="cred-dot"></div><span id="cred-label"></span></div>
    <button class="btn btn-outline btn-sm" id="export-btn" style="display:none" onclick="exportCSV()">↓ Export CSV</button>
    <button class="btn btn-outline btn-sm" id="logout-btn" style="display:none" onclick="logout()">Sign out</button>
  </div>
</header>

<!-- AUTH -->
<div id="auth-screen">
  <div class="page" style="width:100%">
    <div class="auth-card">
      <h2>Connect DataForSEO</h2>
      <p class="sub">Use your <strong>API credentials</strong> from <a href="https://app.dataforseo.com/api-access" target="_blank" style="color:var(--accent)">app.dataforseo.com/api-access</a> — these may differ from your website login.</p>
      <div id="auth-err" class="error-banner"></div>
      <div class="field" style="margin-bottom:12px"><label>Email / Login</label><input type="email" id="auth-email" placeholder="you@example.com" /></div>
      <div class="field" style="margin-bottom:1.5rem"><label>Password</label><input type="password" id="auth-pw" placeholder="••••••••••" /></div>
      <button class="btn btn-primary btn-full" onclick="authenticate()" id="auth-btn">Connect</button>
      <hr class="divider">
      <p style="font-size:12px;color:var(--text3);text-align:center">No account? <a href="https://app.dataforseo.com/register" target="_blank" style="color:var(--accent)">Sign up free →</a></p>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div id="search-screen">
  <div class="page">
    <div class="search-panel">
      <div class="search-grid">
        <div class="field">
          <label>Business category</label>
          <div class="cat-wrap">
            <input type="text" id="s-cat" placeholder="Type to search 5,000+ categories…" autocomplete="off" oninput="filterCats()" onkeydown="catKeyNav(event)" onfocus="showCatDrop()" />
            <div class="cat-dropdown" id="cat-drop" style="display:none"></div>
          </div>
        </div>
        <div class="field">
          <label>City, address or postcode</label>
          <input type="text" id="s-location" placeholder="e.g. Manchester, UK" oninput="locationChanged()" />
          <div class="geo-status" id="geo-status"></div>
        </div>
        <div class="field">
          <label>Max results</label>
          <select id="s-limit">
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="250">250 (auto-paged)</option>
            <option value="500">500 (auto-paged)</option>
          </select>
        </div>
      </div>
      <div class="search-footer">
        <div class="radius-row">
          <label>Search radius</label>
          <div class="radius-track">
            <input type="range" min="1" max="50" value="10" id="s-radius" step="1" oninput="document.getElementById('rad-val').textContent=this.value+'km'" />
            <span class="radius-val" id="rad-val">10km</span>
          </div>
        </div>
        <button class="btn btn-primary" id="search-btn" onclick="doSearch()">Search</button>
      </div>
    </div>

    <div id="search-err" class="error-banner"></div>
    <div class="loader" id="loader"><div class="spinner"></div><span id="loader-msg">Fetching listings…</span></div>

    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-card"><div class="stat-label">Total found</div><div class="stat-value" id="st-total">—</div><div class="stat-sub" id="st-sub"></div></div>
      <div class="stat-card"><div class="stat-label">Avg rating</div><div class="stat-value" id="st-rating">—</div></div>
      <div class="stat-card"><div class="stat-label">Claimed</div><div class="stat-value" id="st-claimed">—</div></div>
      <div class="stat-card"><div class="stat-label">With phone</div><div class="stat-value" id="st-phone">—</div></div>
    </div>

    <div id="results-area"></div>
  </div>
</div>

<script>
let apiLogin='',apiPass='',allResults=[],totalCount=0,currentOffset=0,latLng=null,categories=[];
let catIdx=-1,geoTimer=null,currentCat='',currentRadius=10,currentLimit=100;

function b64(s){return btoa(unescape(encodeURIComponent(s)))}

async function authenticate(){
  const em=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value.trim();
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!em||!pw){showErr(err,'Please enter both fields.');return;}
  setBtn('auth-btn',true,'Connecting…');
  try{
    const resp=await fetch('https://api.dataforseo.com/v3/business_data/business_listings/search/live',{method:'POST',headers:{'Authorization':'Basic '+b64(em+':'+pw),'Content-Type':'application/json'},body:JSON.stringify([{category:'restaurant',location_coordinate:'51.509865,-0.118092',limit:1}])});
    if(resp.status===401||resp.status===403){showErrHTML(err,'Wrong credentials — get your API login and password from <a href="https://app.dataforseo.com/api-access" target="_blank" style="color:var(--danger);text-decoration:underline">app.dataforseo.com/api-access</a>');setBtn('auth-btn',false,'Connect');return;}
    const r=await resp.json();
    if(r.tasks){
      apiLogin=em;apiPass=pw;
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('search-screen').style.display='block';
      document.getElementById('cred-pill').style.display='flex';
      document.getElementById('cred-label').textContent=em;
      document.getElementById('logout-btn').style.display='flex';
      loadCategories();
    }else{showErrHTML(err,'Unexpected response — check your API credentials at <a href="https://app.dataforseo.com/api-access" target="_blank" style="color:var(--danger);text-decoration:underline">app.dataforseo.com/api-access</a>');}
  }catch(e){showErr(err,'Connection error: '+e.message);}
  setBtn('auth-btn',false,'Connect');
}

async function loadCategories(){
  try{
    const r=await fetch('https://api.dataforseo.com/v3/business_data/business_listings/categories',{
      headers:{'Authorization':'Basic '+b64(apiLogin+':'+apiPass),'Content-Type':'application/json'}
    });
    const d=await r.json();
    categories=(d.tasks?.[0]?.result||[]).map(x=>x.category_name).sort();
  }catch(e){}
}

function showCatDrop(){renderCatDrop(document.getElementById('s-cat').value);}
function filterCats(){renderCatDrop(document.getElementById('s-cat').value);}

function renderCatDrop(q){
  const drop=document.getElementById('cat-drop');
  if(!categories.length){drop.innerHTML='<div class="cat-loading">Loading categories…</div>';drop.style.display='block';return;}
  const ql=q.toLowerCase();
  const matches=q.length<1?categories.slice(0,50):categories.filter(c=>c.includes(ql)).slice(0,50);
  if(!matches.length){drop.style.display='none';return;}
  drop.innerHTML=matches.map(c=>`<div class="cat-item" data-val="${c}" onmousedown="selectCat('${c}')">${q?c.replace(new RegExp('('+ql.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<strong>$1</strong>'):c}</div>`).join('');
  drop.style.display='block';catIdx=-1;
}

function selectCat(val){document.getElementById('s-cat').value=val;document.getElementById('cat-drop').style.display='none';}

function catKeyNav(e){
  const drop=document.getElementById('cat-drop');
  const items=drop.querySelectorAll('.cat-item');
  if(e.key==='ArrowDown'){catIdx=Math.min(catIdx+1,items.length-1);hilite(items);}
  else if(e.key==='ArrowUp'){catIdx=Math.max(catIdx-1,0);hilite(items);}
  else if(e.key==='Enter'&&catIdx>=0){selectCat(items[catIdx].dataset.val);e.preventDefault();}
  else if(e.key==='Escape'){drop.style.display='none';}
}
function hilite(items){items.forEach((el,i)=>el.classList.toggle('active',i===catIdx));if(catIdx>=0)items[catIdx].scrollIntoView({block:'nearest'});}
document.addEventListener('click',e=>{if(!e.target.closest('.cat-wrap'))document.getElementById('cat-drop').style.display='none';});

function locationChanged(){
  clearTimeout(geoTimer);latLng=null;setGeo('','');
  const v=document.getElementById('s-location').value.trim();
  if(!v)return;
  setGeo('Looking up location…','');
  geoTimer=setTimeout(()=>geocode(v),600);
}

async function geocode(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`,{headers:{'Accept-Language':'en'}});
    const d=await r.json();
    if(d&&d[0]){
      latLng={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
      setGeo('✓ '+d[0].display_name.split(',').slice(0,3).join(','),'ok');
    }else{setGeo('Location not found — try a different search','err');}
  }catch(e){setGeo('Could not look up location','err');}
}
function setGeo(msg,type){const el=document.getElementById('geo-status');el.textContent=msg;el.className='geo-status'+(type?' geo-'+type:'');}

async function doSearch(){
  const cat=document.getElementById('s-cat').value.trim();
  const loc=document.getElementById('s-location').value.trim();
  const limit=parseInt(document.getElementById('s-limit').value);
  const radius=parseInt(document.getElementById('s-radius').value);
  const err=document.getElementById('search-err');
  err.style.display='none';
  if(!cat){showErr(err,'Please enter a business category.');return;}
  if(!loc){showErr(err,'Please enter a location.');return;}
  if(!latLng){
    setBtn('search-btn',true,'Looking up…');
    await geocode(loc);
    setBtn('search-btn',false,'Search');
    if(!latLng){showErr(err,'Could not find that location. Try being more specific.');return;}
  }
  currentCat=cat;currentRadius=radius;currentLimit=limit;
  allResults=[];currentOffset=0;totalCount=0;
  document.getElementById('stats-row').style.display='none';
  document.getElementById('results-area').innerHTML='';
  document.getElementById('export-btn').style.display='none';
  await fetchPage(true);
}

async function fetchPage(first=false){
  setBtn('search-btn',true,'Searching…');
  document.getElementById('loader').style.display='block';
  document.getElementById('loader-msg').textContent=first?'Fetching listings…':'Fetching more… ('+allResults.length+' so far)';
  try{
    const perPage=Math.min(100,currentLimit-allResults.length);
    const coord=`${latLng.lat.toFixed(6)},${latLng.lng.toFixed(6)},${currentRadius}`;
    const r=await apiFetch('https://api.dataforseo.com/v3/business_data/business_listings/search/live',apiLogin,apiPass,[{
      categories:[currentCat],location_coordinate:coord,limit:perPage,offset:currentOffset
    }]);
    const task=r.tasks?.[0];
    if(!task||task.status_code!==20000)throw new Error(task?.status_message||'API error');
    const res=task.result?.[0];
    const items=res?.items||[];
    totalCount=res?.total_count||items.length;
    allResults=[...allResults,...items];
    currentOffset+=items.length;
    renderResults();
  }catch(e){showErr(document.getElementById('search-err'),'Search failed: '+e.message);}
  document.getElementById('loader').style.display='none';
  setBtn('search-btn',false,'Search');
}

function renderResults(){
  const items=allResults;
  if(!items.length){
    document.getElementById('results-area').innerHTML='<div class="empty"><div class="empty-ico">🔍</div><h3>No results found</h3><p>Try a broader category or larger radius.</p></div>';
    return;
  }
  const withR=items.filter(x=>x.rating?.value);
  const avg=withR.length?(withR.reduce((s,x)=>s+x.rating.value,0)/withR.length).toFixed(1):'—';
  document.getElementById('st-total').textContent=totalCount.toLocaleString();
  document.getElementById('st-sub').textContent='showing '+items.length;
  document.getElementById('st-rating').textContent=avg;
  document.getElementById('st-claimed').textContent=items.filter(x=>x.is_claimed).length;
  document.getElementById('st-phone').textContent=items.filter(x=>x.phone).length;
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('export-btn').style.display='flex';
  const canMore=items.length<totalCount&&items.length<currentLimit;
  document.getElementById('results-area').innerHTML=`
    <div class="results-hdr">
      <h3>Results</h3>
      <div class="results-meta">Showing <strong>${items.length}</strong> of <strong>${totalCount.toLocaleString()}</strong></div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
    ${canMore?'<div class="load-more-row"><button class="btn btn-outline" onclick="fetchPage()">Load more</button></div>':''}
  `;
  const grid=document.getElementById('cards-grid');
  items.forEach(biz=>{
    const ini=(biz.title||'?').split(' ').slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
    const cat=(biz.category||biz.categories?.[0]||'').replace(/_/g,' ');
    const addr=[biz.address,biz.city,biz.zip].filter(Boolean).join(', ');
    const el=document.createElement('div');el.className='biz-card';
    el.innerHTML=`
      <div class="biz-hdr">
        <div class="biz-avatar">${ini}</div>
        <div style="flex:1;min-width:0">
          <div class="biz-name">${esc(biz.title||'Unknown')}</div>
          ${cat?`<span class="biz-cat">${esc(cat)}</span>`:''}
        </div>
      </div>
      <div class="biz-details">
        ${addr?`<div class="biz-detail"><span class="biz-ico">📍</span><span>${esc(addr)}</span></div>`:''}
        ${biz.phone?`<div class="biz-detail"><span class="biz-ico">📞</span><span>${esc(biz.phone)}</span></div>`:''}
        ${biz.url?`<div class="biz-detail"><span class="biz-ico">🌐</span><a href="${esc(biz.url)}" target="_blank" style="color:var(--accent);text-decoration:none">${esc(biz.domain||biz.url)}</a></div>`:''}
      </div>
      <div class="biz-foot">
        <div>${biz.rating?.value?`<div class="rating-pill">★ ${biz.rating.value}${biz.rating.votes_count?` <span style="font-weight:400">(${biz.rating.votes_count.toLocaleString()})</span>`:''}</div>`:''}</div>
        <span class="badge ${biz.is_claimed?'badge-y':'badge-n'}">${biz.is_claimed?'✓ Claimed':'Unclaimed'}</span>
      </div>
    `;
    grid.appendChild(el);
  });
}

function exportCSV(){
  if(!allResults.length)return;
  const h=['Name','Category','Address','City','ZIP','Phone','Website','Rating','Reviews','Claimed'];
  const rows=allResults.map(b=>[b.title||'',(b.category||'').replace(/_/g,' '),b.address||'',b.city||'',b.zip||'',b.phone||'',b.url||'',b.rating?.value||'',b.rating?.votes_count||'',b.is_claimed?'Yes':'No']);
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='business-listings.csv';a.click();
}

function logout(){
  apiLogin='';apiPass='';allResults=[];totalCount=0;currentOffset=0;latLng=null;categories=[];
  ['search-screen','cred-pill','logout-btn','export-btn'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('stats-row').style.display='none';
  document.getElementById('results-area').innerHTML='';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('auth-email').value='';
  document.getElementById('auth-pw').value='';
}

async function apiFetch(url,login,pass,body){
  const r=await fetch(url,{method:'POST',headers:{'Authorization':'Basic '+b64(login+':'+pass),'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}
function showErr(el,msg){el.textContent=msg;el.style.display='block';} function showErrHTML(el,msg){el.innerHTML=msg;el.style.display='block';}
function setBtn(id,dis,txt){const b=document.getElementById(id);b.disabled=dis;b.textContent=txt;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('auth-screen').style.display!=='none')authenticate();});
</script>
